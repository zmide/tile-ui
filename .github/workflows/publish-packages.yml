name: Publish Packages

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          export TAG_VERSION
          node -e '
          const fs = require("node:fs");
          const path = require("node:path");
          const expected = process.env.TAG_VERSION;
          const packages = ["core", "styles", "react", "vue"];
          for (const pkg of packages) {
            const file = path.join(process.cwd(), "packages", pkg, "package.json");
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            if (json.version !== expected) {
              throw new Error(`${json.name} version ${json.version} does not match tag ${expected}`);
            }
          }
          '

      - name: Build publishable packages
        run: pnpm --filter @tile-ui/core build && pnpm --filter @tile-ui/styles build && pnpm --filter @tile-ui/react build && pnpm --filter @tile-ui/vue build

      - name: Publish @tile-ui/core
        run: pnpm --filter @tile-ui/core publish --access public --provenance --no-git-checks

      - name: Publish @tile-ui/styles
        run: pnpm --filter @tile-ui/styles publish --access public --provenance --no-git-checks

      - name: Publish @tile-ui/react
        run: pnpm --filter @tile-ui/react publish --access public --provenance --no-git-checks

      - name: Publish @tile-ui/vue
        run: pnpm --filter @tile-ui/vue publish --access public --provenance --no-git-checks
