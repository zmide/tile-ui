name: Publish Packages

on:
  push:
    tags:
      - 'core/v*.*.*'
      - 'styles/v*.*.*'
      - 'react/v*.*.*'
      - 'vue/v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PACKAGE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          registry-url: "https://registry.npmjs.org"
          cache: 'pnpm'

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Resolve package from tag
        run: |
          PACKAGE_NAME="${PACKAGE_TAG%%/*}"
          TAG_VERSION="${PACKAGE_TAG#*/}"
          TAG_VERSION="${TAG_VERSION#v}"

          case "$PACKAGE_NAME" in
            core|styles|react|vue)
              ;;
            *)
              echo "Unsupported package tag: $PACKAGE_TAG" >&2
              exit 1
              ;;
          esac

          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"
          echo "PACKAGE_DIR=packages/$PACKAGE_NAME" >> "$GITHUB_ENV"
          echo "PACKAGE_FULL_NAME=@tile-ui/$PACKAGE_NAME" >> "$GITHUB_ENV"
          echo "TAG_VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: Verify tag matches package version
        run: |
          node -e '
          const fs = require("node:fs");
          const path = require("node:path");
          const pkgName = process.env.PACKAGE_NAME;
          const expected = process.env.TAG_VERSION;
          const file = path.join(process.cwd(), "packages", pkgName, "package.json");
          const json = JSON.parse(fs.readFileSync(file, "utf8"));
          if (json.version !== expected) {
            throw new Error(`${json.name} version ${json.version} does not match tag ${expected}`);
          }
          '

      - name: Build target package
        run: |
          case "$PACKAGE_NAME" in
            react|vue)
              pnpm --filter @tile-ui/core build
              ;;
          esac

          pnpm --filter "$PACKAGE_FULL_NAME" build

      - name: Publish target package
        run: pnpm --filter "$PACKAGE_FULL_NAME" publish --access public --provenance --no-git-checks
